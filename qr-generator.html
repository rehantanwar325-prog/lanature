<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator — LaNature Hotel</title>
  <meta name="description" content="Generate QR codes for tables and rooms at LaNature Hotel.">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar scrolled">
    <div class="container">
      <a href="index.html" class="navbar-brand">
        <div class="logo-icon">L</div>
        <h1>La<span>Nature</span></h1>
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="admin.html">Admin Dashboard</a></li>
      </ul>
      <button class="nav-hamburger" onclick="document.getElementById('navLinks').classList.toggle('mobile-open')">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- QR Generator -->
  <div class="qr-page">
    <div class="container">
      <div class="qr-card">
        <div class="logo-icon" style="width:50px;height:50px;font-size:1.3rem;margin:0 auto 16px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));">L</div>
        <h2>QR Code Generator</h2>
        <p>Generate QR codes for tables & rooms so guests can order food directly</p>

        <div class="qr-form">
          <div class="form-group">
            <label>Location Type</label>
            <select id="qrType">
              <option value="table">🍽 Table</option>
              <option value="room">🛏 Room</option>
            </select>
          </div>
          <div class="form-group">
            <label>Number</label>
            <input type="number" id="qrNumber" placeholder="e.g. 5" min="1" max="500" value="1">
          </div>
          <button class="btn btn-green btn-block" onclick="generateQR()">Generate QR Code</button>
        </div>

        <div class="qr-result" id="qrResult">
          <h3 style="font-family:var(--font-heading);font-size:1.2rem;margin-bottom:4px;" id="qrLabel">Table 1</h3>
          <div id="qrcode"></div>
          <p class="qr-url" id="qrUrl"></p>
          <div style="display:flex;gap:12px;">
            <button class="btn btn-primary btn-sm" style="flex:1;" onclick="printQR()">🖨 Print QR</button>
            <button class="btn btn-outline btn-sm" style="flex:1;border-color:var(--primary);color:var(--primary);" onclick="downloadQR()">⬇ Download</button>
          </div>
        </div>
      </div>

      <!-- Bulk Generator -->
      <div class="qr-card" style="margin-top:24px;">
        <h2>Bulk Generate</h2>
        <p>Generate QR codes for multiple tables or rooms at once</p>
        <div class="qr-form">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="form-group">
              <label>Type</label>
              <select id="bulkType">
                <option value="table">Tables</option>
                <option value="room">Rooms</option>
              </select>
            </div>
            <div class="form-group">
              <label>Count (1–20)</label>
              <input type="number" id="bulkCount" value="10" min="1" max="20">
            </div>
          </div>
          <button class="btn btn-green btn-block" onclick="bulkGenerate()">Generate All</button>
        </div>
        <div id="bulkResult" style="margin-top:20px;display:none;">
          <div id="bulkGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;"></div>
          <button class="btn btn-primary btn-block" style="margin-top:16px;" onclick="printBulk()">🖨 Print All QR Codes</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    let qrInstance = null;

    function getBaseUrl() {
      const loc = window.location;
      return loc.protocol + '//' + loc.host + loc.pathname.replace('qr-generator.html', '');
    }

    function generateQR() {
      const type = document.getElementById('qrType').value;
      const num = document.getElementById('qrNumber').value || '1';
      const url = getBaseUrl() + 'menu.html?' + type + '=' + num;

      document.getElementById('qrLabel').textContent = (type === 'table' ? 'Table ' : 'Room ') + num;
      document.getElementById('qrUrl').textContent = url;

      const qrDiv = document.getElementById('qrcode');
      qrDiv.innerHTML = '';
      qrInstance = new QRCode(qrDiv, {
        text: url,
        width: 200,
        height: 200,
        colorDark: '#1A1A1A',
        colorLight: '#FFFFFF',
        correctLevel: QRCode.CorrectLevel.H
      });

      document.getElementById('qrResult').classList.add('show');
    }

    function printQR() {
      const printWin = window.open('', '_blank');
      const type = document.getElementById('qrType').value;
      const num = document.getElementById('qrNumber').value || '1';
      const label = (type === 'table' ? 'Table ' : 'Room ') + num;
      const canvas = document.querySelector('#qrcode canvas');
      const imgData = canvas ? canvas.toDataURL() : '';

      printWin.document.write(`
        <html><head><title>QR - ${label}</title>
        <style>
          body{font-family:'Segoe UI',sans-serif;text-align:center;padding:40px;}
          h1{font-size:2rem;margin-bottom:4px;}
          h2{color:#666;font-size:1rem;margin-bottom:20px;}
          img{margin:0 auto;}
          p{color:#999;font-size:0.8rem;margin-top:16px;}
        </style></head>
        <body>
          <h1>LaNature Hotel</h1>
          <h2>${label}</h2>
          <img src="${imgData}" width="250">
          <p>Scan to view menu & order food</p>
          <script>setTimeout(()=>window.print(),300)<\/script>
        </body></html>
      `);
    }

    function downloadQR() {
      const canvas = document.querySelector('#qrcode canvas');
      if (!canvas) return;
      const link = document.createElement('a');
      const type = document.getElementById('qrType').value;
      const num = document.getElementById('qrNumber').value || '1';
      link.download = `LaNature_QR_${type}_${num}.png`;
      link.href = canvas.toDataURL();
      link.click();
    }

    function bulkGenerate() {
      const type = document.getElementById('bulkType').value;
      const count = Math.min(parseInt(document.getElementById('bulkCount').value) || 5, 20);
      const grid = document.getElementById('bulkGrid');
      grid.innerHTML = '';

      for (let i = 1; i <= count; i++) {
        const url = getBaseUrl() + 'menu.html?' + type + '=' + i;
        const label = (type === 'table' ? 'Table ' : 'Room ') + i;
        const div = document.createElement('div');
        div.style.cssText = 'text-align:center;padding:16px;background:var(--bg-warm);border-radius:var(--radius);';
        div.innerHTML = `<p style="font-weight:700;margin-bottom:8px;font-size:0.9rem;">${label}</p><div id="bulk-qr-${i}"></div>`;
        grid.appendChild(div);
        new QRCode(div.querySelector(`#bulk-qr-${i}`), {
          text: url, width: 120, height: 120,
          colorDark: '#1A1A1A', colorLight: '#FFFFFF',
          correctLevel: QRCode.CorrectLevel.M
        });
      }

      document.getElementById('bulkResult').style.display = 'block';
    }

    function printBulk() {
      const type = document.getElementById('bulkType').value;
      const count = Math.min(parseInt(document.getElementById('bulkCount').value) || 5, 20);
      const printWin = window.open('', '_blank');
      let items = '';
      for (let i = 1; i <= count; i++) {
        const canvas = document.querySelector(`#bulk-qr-${i} canvas`);
        const imgData = canvas ? canvas.toDataURL() : '';
        const label = (type === 'table' ? 'Table ' : 'Room ') + i;
        items += `<div style="text-align:center;padding:20px;break-inside:avoid;">
          <h3>${label}</h3>
          <img src="${imgData}" width="160">
          <p style="color:#999;font-size:0.7rem;margin-top:8px;">Scan to order</p>
        </div>`;
      }
      printWin.document.write(`
        <html><head><title>LaNature QR Codes</title>
        <style>
          body{font-family:'Segoe UI',sans-serif;padding:20px;}
          h1{text-align:center;margin-bottom:20px;}
          .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
        </style></head>
        <body>
          <h1>LaNature Hotel — QR Codes</h1>
          <div class="grid">${items}</div>
          <script>setTimeout(()=>window.print(),500)<\/script>
        </body></html>
      `);
    }
  </script>
</body>
</html>
