<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu — LaNature Hotel</title>
  <meta name="description" content="Browse the LaNature Hotel menu. Order starters, main course, beverages, and desserts from your table.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar scrolled" id="mainNav">
    <div class="container">
      <a href="index.html" class="navbar-brand">
        <div class="logo-icon">L</div>
        <h1>La<span>Nature</span></h1>
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="#starters">Starters</a></li>
        <li><a href="#main">Main Course</a></li>
        <li><a href="#beverages">Beverages</a></li>
        <li><a href="#desserts">Desserts</a></li>
      </ul>
      <button class="nav-hamburger" onclick="document.getElementById('navLinks').classList.toggle('mobile-open')">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Menu Header -->
  <div class="menu-header">
    <h2 class="section-title" style="color:var(--white);">Our Menu</h2>
    <p style="color:rgba(255,255,255,0.7); margin-top:8px;">Crafted with love, served with elegance</p>
    <div class="location-badge" id="locationBadge">
      📍 <span id="locationText">Table 1</span>
    </div>
  </div>

  <!-- Category Tabs -->
  <div class="menu-categories" id="menuCategories">
    <button class="cat-btn active" data-cat="all" onclick="filterMenu('all', this)">All Items</button>
    <button class="cat-btn" data-cat="starters" onclick="filterMenu('starters', this)">🥘 Starters</button>
    <button class="cat-btn" data-cat="main" onclick="filterMenu('main', this)">🍛 Main Course</button>
    <button class="cat-btn" data-cat="beverages" onclick="filterMenu('beverages', this)">🥤 Beverages</button>
    <button class="cat-btn" data-cat="desserts" onclick="filterMenu('desserts', this)">🍮 Desserts</button>
  </div>

  <!-- Menu Items -->
  <div class="container">
    <div class="menu-grid" id="menuGrid"></div>
  </div>

  <!-- Floating Cart Button -->
  <div class="floating-cart" onclick="toggleCart()">
    🛒
    <span class="badge" style="display:none;">0</span>
  </div>

  <!-- Cart Overlay -->
  <div class="cart-overlay" onclick="toggleCart()"></div>

  <!-- Cart Sidebar -->
  <div class="cart-sidebar">
    <div class="cart-header">
      <h3>🛒 Your Cart</h3>
      <button class="cart-close" onclick="toggleCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItems">
      <div class="cart-empty">
        <div class="empty-icon">🛒</div>
        <p>Your cart is empty</p>
        <p style="font-size:0.8rem;">Add some delicious items!</p>
      </div>
    </div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>Total</span>
        <span id="cartTotal">₹0</span>
      </div>
      <input type="text" class="cart-name-input" id="customerName" placeholder="Enter your name *" maxlength="40">
      <button class="btn btn-green btn-block" onclick="handlePlaceOrder()">Place Order →</button>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // Set location info
    const loc = getLocationInfo();
    document.getElementById('locationText').textContent = loc.type + ' ' + loc.number;

    // Render menu
    function renderMenu(category = 'all') {
      const grid = document.getElementById('menuGrid');
      const items = category === 'all' ? getMenuData() : getMenuData().filter(i => i.category === category);
      grid.innerHTML = items.map(item => `
        <div class="menu-item" data-id="${item.id}" style="animation: fadeUp 0.5s ease-out both;">
          <img src="${item.img}" class="menu-item-img" alt="${item.name}"
               onerror="this.src='https://placehold.co/400x200/2D5016/C9A84C?text=${encodeURIComponent(item.name)}'">
          <div class="menu-item-body">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
              <span style="width:14px;height:14px;border:2px solid ${item.veg?'#27AE60':'#E74C3C'};border-radius:3px;display:flex;align-items:center;justify-content:center;">
                <span style="width:6px;height:6px;border-radius:50%;background:${item.veg?'#27AE60':'#E74C3C'}"></span>
              </span>
              <span style="font-size:0.7rem;color:${item.veg?'#27AE60':'#E74C3C'};font-weight:600;">${item.veg?'VEG':'NON-VEG'}</span>
            </div>
            <h3>${item.name}</h3>
            <p class="desc">${item.desc}</p>
            <div class="menu-item-footer">
              <span class="price">₹${item.price}</span>
              <button class="add-btn" onclick="addToCart(${item.id})">+ Add</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function filterMenu(cat, btn) {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderMenu(cat);
    }

    function handlePlaceOrder() {
      const name = document.getElementById('customerName').value.trim();
      if (!name) {
        document.getElementById('customerName').style.borderColor = '#E74C3C';
        document.getElementById('customerName').placeholder = '⚠ Please enter your name!';
        document.getElementById('customerName').focus();
        return;
      }
      if (cart.length === 0) {
        alert('Please add items to your cart first!');
        return;
      }
      // Set customer name in order
      const loc = getLocationInfo();
      const order = {
        id: generateOrderId(),
        customer: name,
        locationType: loc.type,
        locationNumber: loc.number,
        items: cart.map(c => ({ name: c.name, qty: c.qty, price: c.price })),
        total: getCartTotal(),
        status: 'new',
        paymentMethod: null,
        time: new Date().toISOString()
      };
      sessionStorage.setItem('lanature_pending_order', JSON.stringify(order));
      window.location.href = 'payment.html';
    }

    renderMenu();
  </script>
</body>
</html>
